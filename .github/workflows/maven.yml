name: Automated Code Review
on:
  pull_request:
    branches: [ "main" ]

jobs:
  checkstyle-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkstyle
        uses: dbelyaev/action-checkstyle@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          level: 'warning'
          # ÉP PHẢI FAIL: Không có dòng này thì vĩnh viễn nó sẽ Pass
          fail_on_error: true

      # Nếu bước trên không tự ngắt, thêm bước này để ép nút Merge bị khóa
      - name: Force Failure on Warnings
        if: steps.checkstyle.outputs.total_issues > 0
        run: exit 1